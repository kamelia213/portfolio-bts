<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message envoyé</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#f5f5f5,#eaeaea);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:50px;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,0.1);
text-align:center;
max-width:450px;
animation:fade 0.8s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.check{
font-size:50px;
margin-bottom:20px;
}

h1{
margin-bottom:10px;
}

p{
color:#555;
margin-bottom:30px;
}

a{
display:inline-block;
padding:12px 26px;
background:black;
color:white;
text-decoration:none;
border-radius:6px;
transition:0.3s;
}

a:hover{
background:#333;
}

</style>
</head>

<body>

<div class="container">

<div class="check">✓</div>

<h1>Message envoyé</h1>

<p>
Merci pour votre message.  
Je vous répondrai dès que possible.
</p>

<a href="index.html">Retour au portfolio</a>

</div>

</body>

</html>
